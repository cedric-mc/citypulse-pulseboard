version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: citypulse_db
    environment:
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse123
      POSTGRES_DB: citypulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: